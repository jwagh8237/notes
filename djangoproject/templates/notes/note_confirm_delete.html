{% extends 'home.html' %}

{% block title %}Delete note | Notes{% endblock %}

{% block content %}
<section class="form-shell">
    <div class="form-panel compact">
        <p class="eyebrow">Delete note</p>
        <h1>{{ note.title }}</h1>
        <p class="helper-text">This will permanently remove the note from your workspace.</p>
        <form method="post" class="form-actions">
            {% csrf_token %}
            <button type="submit" class="danger-button">Delete note</button>
            <a href="{% url 'note_list' %}" class="muted-link">Cancel</a>
        </form>
    </div>
</section>
{% endblock %}
